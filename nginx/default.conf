server {
    listen 80;
    server_name ent.timote.ovh;

    # Frontend React
    location / {
        proxy_pass http://frontend:3000; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Backend Node.js (API)
    # On utilise le préfixe /api pour ne pas interférer avec React
    location /api {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}